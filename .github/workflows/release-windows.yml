name: Build & Release (Windows)

# Cut a release by pushing a version tag:
#     git tag v0.1.0 && git push origin v0.1.0
# …or run it by hand from the Actions tab. On a manual run you may supply a tag to
# publish a release; leave it blank to just build the downloadable artifacts.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish a release for (e.g. v0.1.0). Blank = build artifacts only."
        required: false
        default: ""

# Let the built-in token create / update GitHub Releases.
permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust (stable, x64 MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app (NSIS installer + portable exe, x64)
        run: npx tauri build --target x86_64-pc-windows-msvc --bundles nsis

      - name: Stage release artifacts
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          ver=$(node -p "require('./src-tauri/tauri.conf.json').version")
          rel="src-tauri/target/x86_64-pc-windows-msvc/release"
          out="release-artifacts"
          mkdir -p "$out"

          # Installer — the NSIS "…-setup.exe".
          setup=$(ls "$rel"/bundle/nsis/*-setup.exe | head -n1)
          cp "$setup" "$out/CorePTY_${ver}_x64-setup.exe"

          # Portable — the self-contained app binary (the web UI is embedded), no install.
          cp "$rel/corepty.exe" "$out/CorePTY_${ver}_x64-portable.exe"

          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Staged artifacts:"; ls -la "$out"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: corepty-windows-x64
          path: release-artifacts/*
          if-no-files-found: error

      - name: Resolve release tag
        id: rel
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if [ -n "${tag}" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Releases
        if: steps.rel.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.rel.outputs.tag }}
          name: CorePTY ${{ steps.rel.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: release-artifacts/*
          body: |
            **CorePTY ${{ steps.rel.outputs.tag }} — Windows (64-bit)**

            | Download | What it is |
            |---|---|
            | `CorePTY_${{ steps.stage.outputs.version }}_x64-setup.exe` | **Installer** (NSIS) — creates a Start-menu shortcut and an uninstaller, and installs the WebView2 runtime if it's missing. |
            | `CorePTY_${{ steps.stage.outputs.version }}_x64-portable.exe` | **Portable** — a single self-contained executable, no installation. Needs the Microsoft Edge WebView2 runtime (preinstalled on Windows 11 and current Windows 10). |
